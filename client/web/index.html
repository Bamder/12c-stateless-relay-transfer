<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>12C 文件传输</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="boot-screen" class="boot-screen">
      <div class="boot-card">
        <div class="brand">12C Transfer</div>
        <p id="boot-status" class="boot-status">正在加载加密模块…</p>
        <div class="boot-progress" aria-hidden="true">
          <div id="boot-progress-bar" class="boot-progress-bar"></div>
        </div>
      </div>
    </div>

    <div id="app" class="app hidden">
      <aside class="sidebar">
        <div class="brand">12C Transfer</div>
        <nav class="nav">
          <button type="button" class="nav-item active" data-panel="send">发送</button>
          <button type="button" class="nav-item" data-panel="receive">接收</button>
          <button type="button" class="nav-item" data-panel="settings">设置</button>
        </nav>
        <div class="sidebar-foot">
          <div class="registry-pill">
            <span class="registry-pill-label">Registry</span>
            <span id="registry-url-label" class="registry-pill-value">—</span>
          </div>
        </div>
      </aside>

      <main class="main">
        <section id="panel-send" class="panel active">
          <header class="panel-header">
            <div>
              <h1>发送文件</h1>
              <p class="subtitle">加密上传至 Relay，生成 12 位带外凭证</p>
            </div>
          </header>
          <div id="send-error" class="banner error hidden"></div>
          <div id="send-info" class="banner info hidden"></div>
          <div class="card send-card">
            <div class="send-row">
              <label id="send-file-dropzone" class="file-dropzone" for="send-file-input">
                <input id="send-file-input" type="file" class="file-input-hidden" />
                <span id="send-file-empty" class="file-dropzone-empty">点击以选择文件</span>
                <span id="send-file-selected" class="file-dropzone-selected hidden">
                  <span id="send-file-icon" class="file-icon" aria-hidden="true"></span>
                  <span id="send-file-name" class="file-name"></span>
                  <span id="send-file-size" class="file-size"></span>
                </span>
                <span id="send-upload-stamp" class="upload-stamp hidden" aria-hidden="true">
                  <span class="upload-stamp-inner">已上传</span>
                </span>
              </label>
              <button id="send-btn" type="button" class="primary-btn send-btn" disabled>
                上传并生成凭证
              </button>
            </div>

            <div class="send-credential-section">
              <div class="send-credential-header">
                <span class="field-label send-credential-title">12C 文件提取凭证</span>
                <button id="copy-credential-btn" type="button" class="ghost-btn" disabled>
                  复制凭证
                </button>
              </div>
              <div id="send-credential-slots" class="credential-slots"></div>
            </div>

            <div class="send-upload-progress">
              <div class="progress-label">
                <span>上传进度</span>
                <span id="send-progress-text"></span>
              </div>
              <div class="progress-bar send-progress-bar">
                <div id="send-progress-bar" class="progress-bar-fill"></div>
              </div>
            </div>
          </div>
        </section>

        <section id="panel-receive" class="panel">
          <header class="panel-header">
            <div>
              <h1>接收文件</h1>
              <p class="subtitle">输入 12 位凭证，从 Relay 下载并解密</p>
            </div>
          </header>
          <div id="receive-error" class="banner error hidden"></div>
          <div class="card receive-card">
            <div class="receive-credential-section">
              <span class="field-label receive-credential-title">12C 文件提取凭证</span>
              <div id="receive-credential-slots"></div>
            </div>

            <div class="receive-flow">
              <button
                id="receive-download-btn"
                type="button"
                class="receive-download-trigger"
                disabled
                aria-label="点击下载"
              >
                <span class="receive-download-arrow" aria-hidden="true">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 48 48"
                    width="48"
                    height="48"
                    aria-hidden="true"
                    focusable="false"
                  >
                    <path
                      d="M24 44 4 18h12V4h16v14h12L24 44z"
                      fill="currentColor"
                    />
                  </svg>
                </span>
                <span id="receive-download-hint" class="receive-download-hint">点击下载</span>
              </button>

              <div
                id="receive-file-bar"
                class="receive-file-bar receive-file-bar--pending"
                role="presentation"
              >
                <span id="receive-file-pending" class="receive-file-pending">等待下载</span>
                <span id="receive-file-ready" class="receive-file-ready hidden">
                  <span id="receive-file-icon" class="file-icon" aria-hidden="true"></span>
                  <span id="receive-file-name" class="file-name"></span>
                  <span id="receive-file-size" class="file-size"></span>
                </span>
                <span id="receive-file-save-hint" class="receive-file-save-hint hidden"
                  >点击保存到本地</span
                >
              </div>
            </div>
          </div>
        </section>

        <section id="panel-settings" class="panel">
          <header class="panel-header">
            <div>
              <h1>设置</h1>
              <p class="subtitle">Registry 连接与本地偏好</p>
            </div>
          </header>
          <div id="settings-error" class="banner error hidden"></div>
          <div id="settings-info" class="banner info hidden"></div>
          <div class="card settings-card">
            <label class="field">
              <span class="field-label">配置Registry服务器URL</span>
              <input
                id="registry-url-input"
                type="url"
                placeholder="http://127.0.0.1:8080"
              />
            </label>
            <div class="button-row">
              <button id="save-settings-btn" type="button" class="primary-btn">保存并重连</button>
              <button id="reset-settings-btn" type="button" class="ghost-btn">恢复默认</button>
            </div>

            <div class="settings-section settings-section--ttl">
              <span class="field-label">文件有效时间</span>
              <div class="duration-input-row">
                <label class="duration-field">
                  <input
                    id="file-ttl-hours"
                    type="number"
                    min="0"
                    max="24"
                    inputmode="numeric"
                    placeholder="0-24"
                  />
                  <span class="duration-unit">时</span>
                </label>
                <label class="duration-field">
                  <input
                    id="file-ttl-minutes"
                    type="number"
                    min="0"
                    max="59"
                    inputmode="numeric"
                    placeholder="0-59"
                  />
                  <span class="duration-unit">分</span>
                </label>
                <label class="duration-field">
                  <input
                    id="file-ttl-seconds"
                    type="number"
                    min="0"
                    max="59"
                    inputmode="numeric"
                    placeholder="0-59"
                  />
                  <span class="duration-unit">秒</span>
                </label>
                <button id="confirm-file-ttl-btn" type="button" class="ghost-btn duration-confirm-btn">
                  确认
                </button>
              </div>
              <p class="hint hint-small">
                当前上传文件的有效期为：<span id="file-ttl-current">1小时0分钟0秒</span>
              </p>
            </div>

            <div class="settings-section settings-section--credential-style">
              <span class="field-label">凭证风格</span>
              <div class="credential-style-options">
                <label class="checkbox-field">
                  <input id="credential-style-uppercase" type="checkbox" checked />
                  <span>包含大写英文字母</span>
                </label>
                <label class="checkbox-field">
                  <input id="credential-style-lowercase" type="checkbox" checked />
                  <span>包含小写英文字母</span>
                </label>
                <label class="checkbox-field">
                  <input id="credential-style-word" type="checkbox" />
                  <span>单词风格</span>
                </label>
                <label class="checkbox-field">
                  <input id="credential-style-hyphen" type="checkbox" />
                  <span>包含至多一个短横杠</span>
                </label>
                <label class="checkbox-field">
                  <input id="credential-style-letters-last-six" type="checkbox" />
                  <span>字母仅在后6位</span>
                </label>
                <label class="checkbox-field">
                  <input id="credential-style-letters-first-six" type="checkbox" />
                  <span>字母仅在前6位</span>
                </label>
              </div>
              <div class="credential-style-footer">
                <p class="hint hint-small credential-style-current-line">
                  当前上传凭证风格为：<span id="credential-style-current">大写字母、小写字母</span>
                </p>
                <button
                  id="confirm-credential-style-btn"
                  type="button"
                  class="ghost-btn duration-confirm-btn"
                >
                  确认
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
